<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Compras</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>🛒 Lista de Compras</h1>
</header>

<main>

  <!-- FORMULÁRIO DE ADIÇÃO -->
  <div class="form-card">
    <h2>Adicionar Produto</h2>
    <div class="form-row">
      <div class="field">
        <label>Nome do produto</label>
        <input type="text" id="input-name" placeholder="Ex: Doritos" />
      </div>
      <div class="field" style="max-width: 180px;">
        <label>Valor (R$)</label>
        <input type="number" id="input-price" placeholder="0,00" step="0.01" min="0" />
      </div>
      <button class="btn btn-primary" onclick="addItem()">
        ＋ Adicionar
      </button>
    </div>
  </div>

  <!-- LISTA DE PRODUTOS -->
  <div class="list-header">
    <h2>Produtos</h2>
    <span id="item-count">0 itens</span>
  </div>

  <div id="items-list">
    <div class="empty-state">
      <div class="spinner" style="border-color:rgba(0,0,0,0.1); border-top-color: var(--primary); width:28px; height:28px; margin: 0 auto 1rem;"></div>
      <p>Carregando...</p>
    </div>
  </div>

  <!-- TOTAL -->
  <div class="total-bar" id="total-bar" style="display:none;">
    <span>💰 Total da lista</span>
    <strong id="total-value">R$ 0,00</strong>
  </div>

</main>

<!-- MODAL DE EDIÇÃO -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>✏️ Editar Produto</h3>
    <input type="hidden" id="edit-id" />
    <div class="field">
      <label>Nome do produto</label>
      <input type="text" id="edit-name" placeholder="Nome do produto" />
    </div>
    <div class="field">
      <label>Valor (R$)</label>
      <input type="number" id="edit-price" placeholder="0,00" step="0.01" min="0" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- NOTIFICAÇÃO TOAST -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
